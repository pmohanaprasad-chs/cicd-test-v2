# ============================================================================
# deploy.yml  –  Infra → Build → ECR → ECS
#
# Jira flow:
#   build-and-push  → create ticket → In Progress
#   deploy-dev      → comment only  (stays In Progress)
#   deploy-staging  → comment only  (stays In Progress)
#   deploy-prod     → comment + transition to Done
# ============================================================================
name: Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing ECR image tag to promote (skip build)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  TF_VERSION: '1.7.5'
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

# ============================================================================
# JOB 1 – Provision infrastructure (idempotent)
# ============================================================================
jobs:
  provision-infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    outputs:
      ecr_url: ${{ steps.outputs.outputs.ecr_url }}
      alb_dns: ${{ steps.outputs.outputs.alb_dns }}
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      service_dev: ${{ steps.outputs.outputs.service_dev }}
      service_staging: ${{ steps.outputs.outputs.service_staging }}
      service_prod: ${{ steps.outputs.outputs.service_prod }}
      task_family_dev: ${{ steps.outputs.outputs.task_family_dev }}
      task_family_staging: ${{ steps.outputs.outputs.task_family_staging }}
      task_family_prod: ${{ steps.outputs.outputs.task_family_prod }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tf-infra-${{ github.run_id }}

      # ── Clean up unused VPCs to avoid hitting the 5-VPC account limit ────────
      - name: Clean up all orphaned cicd-demo resources
        run: |
          PROJECT="${{ vars.PROJECT_NAME }}"

          echo "=== Cleaning up all orphaned ${PROJECT} resources ==="

          # ── Helper: delete a VPC and all its dependencies ─────────────────
          delete_vpc() {
            local VPC_ID="$1"
            echo "Deleting VPC: $VPC_ID"

            # NAT gateways first (longest to delete)
            for NAT in $(aws ec2 describe-nat-gateways               --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available,pending"               --query 'NatGateways[*].NatGatewayId' --output text 2>/dev/null); do
              aws ec2 delete-nat-gateway --nat-gateway-id "$NAT" 2>/dev/null &&                 echo "  Deleting NAT: $NAT" || true
            done

            # Wait for NAT gateways to finish
            for i in $(seq 1 24); do
              PENDING=$(aws ec2 describe-nat-gateways                 --filter "Name=vpc-id,Values=$VPC_ID"                          "Name=state,Values=available,pending,deleting"                 --query 'length(NatGateways)' --output text 2>/dev/null || echo "0")
              [[ "$PENDING" == "0" || "$PENDING" == "None" ]] && break
              echo "  Waiting for NAT ($PENDING remaining)..."
              sleep 10
            done

            # Network interfaces — wait for them to detach/delete
            for i in $(seq 1 12); do
              ENI_COUNT=$(aws ec2 describe-network-interfaces                 --filters "Name=vpc-id,Values=$VPC_ID"                           "Name=status,Values=in-use"                 --query 'length(NetworkInterfaces)' --output text 2>/dev/null || echo "0")
              [[ "$ENI_COUNT" == "0" || "$ENI_COUNT" == "None" ]] && break
              echo "  Waiting for $ENI_COUNT ENI(s) to detach..."
              sleep 10
            done

            # Delete remaining ENIs explicitly
            for ENI in $(aws ec2 describe-network-interfaces               --filters "Name=vpc-id,Values=$VPC_ID"               --query 'NetworkInterfaces[?Status!=`in-use`].NetworkInterfaceId'               --output text 2>/dev/null); do
              aws ec2 delete-network-interface --network-interface-id "$ENI" 2>/dev/null || true
            done

            # Subnets
            for SUBNET in $(aws ec2 describe-subnets               --filters "Name=vpc-id,Values=$VPC_ID"               --query 'Subnets[*].SubnetId' --output text 2>/dev/null); do
              aws ec2 delete-subnet --subnet-id "$SUBNET" 2>/dev/null || true
            done

            # IGWs
            for IGW in $(aws ec2 describe-internet-gateways               --filters "Name=attachment.vpc-id,Values=$VPC_ID"               --query 'InternetGateways[*].InternetGatewayId' --output text 2>/dev/null); do
              aws ec2 detach-internet-gateway --internet-gateway-id "$IGW"                 --vpc-id "$VPC_ID" 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$IGW" 2>/dev/null || true
            done

            # Route tables (non-main)
            for RT in $(aws ec2 describe-route-tables               --filters "Name=vpc-id,Values=$VPC_ID"               --query 'RouteTables[?!Associations[?Main==`true`]].RouteTableId'               --output text 2>/dev/null); do
              aws ec2 delete-route-table --route-table-id "$RT" 2>/dev/null || true
            done

            # Security groups (non-default) — revoke rules first to break dependencies
            for SG in $(aws ec2 describe-security-groups               --filters "Name=vpc-id,Values=$VPC_ID"               --query 'SecurityGroups[?GroupName!=`default`].GroupId'               --output text 2>/dev/null); do
              # Revoke all ingress and egress rules first
              aws ec2 revoke-security-group-ingress --group-id "$SG"                 --ip-permissions "$(aws ec2 describe-security-groups                   --group-ids "$SG"                   --query 'SecurityGroups[0].IpPermissions'                   --output json 2>/dev/null)" 2>/dev/null || true
              aws ec2 revoke-security-group-egress --group-id "$SG"                 --ip-permissions "$(aws ec2 describe-security-groups                   --group-ids "$SG"                   --query 'SecurityGroups[0].IpPermissionsEgress'                   --output json 2>/dev/null)" 2>/dev/null || true
              aws ec2 delete-security-group --group-id "$SG" 2>/dev/null || true
            done

            aws ec2 delete-vpc --vpc-id "$VPC_ID" 2>/dev/null               && echo "  ✅ Deleted VPC $VPC_ID"               || echo "  ⚠️  Could not delete VPC $VPC_ID — may need another pass"
          }

          # ── Step 1: ECS ───────────────────────────────────────────────────
          echo "--- ECS ---"
          for SVC in dev staging prod; do
            aws ecs update-service --cluster "${PROJECT}-cluster"               --service "${PROJECT}-${SVC}" --desired-count 0 2>/dev/null || true
            aws ecs delete-service --cluster "${PROJECT}-cluster"               --service "${PROJECT}-${SVC}" --force 2>/dev/null               && echo "Deleted ECS service ${SVC}" || true
          done
          aws ecs put-cluster-capacity-providers             --cluster "${PROJECT}-cluster"             --capacity-providers []             --default-capacity-provider-strategy [] 2>/dev/null || true
          aws ecs delete-cluster --cluster "${PROJECT}-cluster" 2>/dev/null             && echo "Deleted ECS cluster" || true

          # ── Step 2: ASG — force delete and wait for instances to terminate ─
          echo "--- ASG ---"
          aws autoscaling delete-auto-scaling-group             --auto-scaling-group-name "${PROJECT}-ecs-asg"             --force-delete 2>/dev/null && echo "Deleted ASG" || true

          echo "Waiting for EC2 instances to terminate..."
          for i in $(seq 1 24); do
            INSTANCES=$(aws ec2 describe-instances               --filters "Name=tag:aws:autoscaling:groupName,Values=${PROJECT}-ecs-asg"                         "Name=instance-state-name,Values=running,stopping,shutting-down,pending"               --query 'length(Reservations)' --output text 2>/dev/null || echo "0")
            [[ "$INSTANCES" == "0" || "$INSTANCES" == "None" ]] && echo "✅ All instances terminated" && break
            echo "  Waiting for $INSTANCES instance(s) to terminate..."
            sleep 10
          done

          # ── Step 3: ALB ───────────────────────────────────────────────────
          echo "--- ALB ---"
          ALB_ARN=$(aws elbv2 describe-load-balancers             --names "${PROJECT}-alb"             --query 'LoadBalancers[0].LoadBalancerArn'             --output text 2>/dev/null || echo "")
          if [[ -n "$ALB_ARN" && "$ALB_ARN" != "None" ]]; then
            for LISTENER in $(aws elbv2 describe-listeners               --load-balancer-arn "$ALB_ARN"               --query 'Listeners[*].ListenerArn' --output text 2>/dev/null); do
              aws elbv2 delete-listener --listener-arn "$LISTENER" 2>/dev/null || true
            done
            aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" 2>/dev/null               && echo "Deleted ALB" || true
            echo "Waiting for ALB deletion..."
            sleep 20
          fi
          for ENV in dev staging prod; do
            TG_ARN=$(aws elbv2 describe-target-groups               --names "${PROJECT}-${ENV}-tg"               --query 'TargetGroups[0].TargetGroupArn'               --output text 2>/dev/null || echo "")
            [[ -n "$TG_ARN" && "$TG_ARN" != "None" ]] &&               aws elbv2 delete-target-group --target-group-arn "$TG_ARN" 2>/dev/null               && echo "Deleted TG ${ENV}" || true
          done

          # ── Step 4: All cicd-demo VPCs ────────────────────────────────────
          echo "--- VPCs ---"
          for VPC_ID in $(aws ec2 describe-vpcs             --filters "Name=tag:Name,Values=${PROJECT}-vpc"             --query 'Vpcs[*].VpcId' --output text 2>/dev/null); do
            delete_vpc "$VPC_ID"
          done

          # ── Step 5: Release orphaned EIPs ─────────────────────────────────
          for EIP in $(aws ec2 describe-addresses             --filters "Name=tag:Name,Values=${PROJECT}-*"             --query 'Addresses[?AssociationId==null].AllocationId'             --output text 2>/dev/null); do
            aws ec2 release-address --allocation-id "$EIP" 2>/dev/null               && echo "Released EIP: $EIP" || true
          done

          # ── Step 6: Launch templates ───────────────────────────────────────
          for LT in $(aws ec2 describe-launch-templates             --filters "Name=launch-template-name,Values=${PROJECT}-ecs-*"             --query 'LaunchTemplates[*].LaunchTemplateId' --output text 2>/dev/null); do
            aws ec2 delete-launch-template --launch-template-id "$LT" 2>/dev/null               && echo "Deleted launch template: $LT" || true
          done

          VPC_COUNT=$(aws ec2 describe-vpcs --query 'length(Vpcs)' --output text)
          echo "=== Done. VPC count: $VPC_COUNT/5 ==="
          if [[ "$VPC_COUNT" -ge 5 ]]; then
            echo "❌ Still at VPC limit"
            exit 1
          fi

      - name: Bootstrap Terraform state backend
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${{ vars.TF_LOCK_TABLE }}"
          REGION="${{ env.AWS_REGION }}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 state bucket: $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
            echo "✅ Created S3 bucket"
          else
            echo "✅ S3 bucket exists"
          fi

          TABLE_EXISTS=$(aws dynamodb list-tables --output text \
            | tr '\t' '\n' | grep -x "$TABLE" || true)

          if [[ -z "$TABLE_EXISTS" ]]; then
            echo "Creating DynamoDB lock table: $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "✅ Created DynamoDB table: $TABLE"
          else
            echo "✅ DynamoDB table exists: $TABLE"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write tfvars
        working-directory: terraform
        run: |
          cat > terraform.tfvars << EOF
          aws_region   = "${{ env.AWS_REGION }}"
          project_name = "${{ vars.PROJECT_NAME }}"
          github_org   = "${{ vars.TF_GITHUB_ORG }}"
          github_repo  = "${{ vars.TF_GITHUB_REPO }}"
          EOF

      # ── Wipe stale Terraform state after cleanup ────────────────────────────
      # After orphan cleanup, the state file may reference deleted resources.
      # Wipe it so terraform starts fresh — import step will re-import survivors.
      - name: Wipe stale Terraform state
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          KEY="cicd-demo/terraform.tfstate"
          TABLE="${{ vars.TF_LOCK_TABLE }}"

          # Check if state bucket exists
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "⏭️  State bucket doesn't exist yet — nothing to wipe"
            exit 0
          fi

          # Check if state file exists
          if ! aws s3api head-object --bucket "$BUCKET" --key "$KEY" 2>/dev/null; then
            echo "⏭️  No state file found — nothing to wipe"
            exit 0
          fi

          # Delete the state file so terraform starts completely fresh
          aws s3 rm "s3://${BUCKET}/${KEY}" 2>/dev/null &&             echo "✅ Wiped stale state file" || true

          # Also clear DynamoDB checksums and locks
          for SUFFIX in "" "-md5"; do
            LOCK_KEY="${BUCKET}/${KEY}${SUFFIX}"
            aws dynamodb delete-item               --table-name "$TABLE"               --key "{"LockID": {"S": "${LOCK_KEY}"}}" 2>/dev/null || true
          done
          echo "✅ Cleared DynamoDB locks and checksums"

      - name: Fix state checksum if corrupted
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${{ vars.TF_LOCK_TABLE }}"
          KEY="cicd-demo/terraform.tfstate"

          TABLE_EXISTS=$(aws dynamodb list-tables --output text \
            | tr '\t' '\n' | grep -x "$TABLE" || true)

          if [[ -z "$TABLE_EXISTS" ]]; then
            echo "⏭️  DynamoDB table not found — skipping"
            exit 0
          fi

          LOCK_KEY="${BUCKET}/${KEY}-md5"
          ITEM=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}" \
            --output json 2>/dev/null || echo "{}")

          if echo "$ITEM" | jq -e '.Item' > /dev/null 2>&1; then
            echo "🔧 Stale checksum found — removing"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}"
            echo "✅ Checksum cleared"
          else
            echo "✅ No stale checksum"
          fi

          LOCK_KEY2="${BUCKET}/${KEY}"
          LOCK=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\": {\"S\": \"${LOCK_KEY2}\"}}" \
            --output json 2>/dev/null || echo "{}")

          if echo "$LOCK" | jq -e '.Item' > /dev/null 2>&1; then
            echo "🔧 Stuck lock found — releasing"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\": {\"S\": \"${LOCK_KEY2}\"}}"
            echo "✅ Lock released"
          else
            echo "✅ No stuck lock"
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cicd-demo/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Import existing resources
        working-directory: terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: |
          set -x
          bash ../scripts/tf-import-ci.sh

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -input=false
          EXIT=$?
          set -e
          if   [[ $EXIT -eq 0 ]]; then echo "result=no_changes" >> "$GITHUB_OUTPUT"
          elif [[ $EXIT -eq 2 ]]; then echo "result=changes"    >> "$GITHUB_OUTPUT"
          else exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.result == 'changes'
        working-directory: terraform
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        id: outputs
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cicd-demo/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true" > /dev/null 2>&1

          echo "ecr_url=$(terraform output -raw ecr_repository_url)"              >> "$GITHUB_OUTPUT"
          echo "alb_dns=$(terraform output -raw alb_dns_name)"                    >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)"           >> "$GITHUB_OUTPUT"
          echo "service_dev=$(terraform output -raw ecs_service_dev)"             >> "$GITHUB_OUTPUT"
          echo "service_staging=$(terraform output -raw ecs_service_staging)"     >> "$GITHUB_OUTPUT"
          echo "service_prod=$(terraform output -raw ecs_service_prod)"           >> "$GITHUB_OUTPUT"
          echo "task_family_dev=$(terraform output -raw task_family_dev)"         >> "$GITHUB_OUTPUT"
          echo "task_family_staging=$(terraform output -raw task_family_staging)" >> "$GITHUB_OUTPUT"
          echo "task_family_prod=$(terraform output -raw task_family_prod)"       >> "$GITHUB_OUTPUT"

      - name: Sync ALB URLs to GitHub variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ALB="http://${{ steps.outputs.outputs.alb_dns }}"
          REPO="${{ github.repository }}"
          gh variable set "DEV_URL"     --body "${ALB}/dev"     --env dev     --repo "$REPO"
          gh variable set "STAGING_URL" --body "${ALB}/staging" --env staging --repo "$REPO"
          gh variable set "PROD_URL"    --body "$ALB"           --env prod    --repo "$REPO"
          echo "✅ URLs synced: $ALB"

      - name: Summary
        working-directory: terraform
        run: |
          STATUS="${{ steps.plan.outputs.result }}"
          ALB="http://${{ steps.outputs.outputs.alb_dns }}"
          [[ "$STATUS" == "no_changes" ]] \
            && echo "## ✅ Infrastructure unchanged" >> $GITHUB_STEP_SUMMARY \
            || echo "## 🏗️ Infrastructure updated"  >> $GITHUB_STEP_SUMMARY
          echo "ALB: $ALB" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 2 – Build & push + create Jira ticket → In Progress
  # ============================================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: provision-infra
    environment: dev

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.digest }}
      jira_key: ${{ steps.jira_create.outputs.jira_key }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: build-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Create Jira ticket → In Progress ───────────────────────────────────
      - name: Create Jira task → In Progress
        id: jira_create
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUMMARY="Deploy #${{ github.run_number }} - ${SHORT_SHA} (${{ github.ref_name }})"
          DESCRIPTION="Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Message: ${{ github.event.head_commit.message }}
          Run: ${RUN_URL}"

          # stderr (logs) printed to console; stdout is the clean key only
          JIRA_KEY=$(node scripts/jira-transition.js \
            --action create \
            --project CSD \
            --summary "$SUMMARY" \
            --description "$DESCRIPTION" 2>/dev/null)

          echo "jira_key=${JIRA_KEY}" >> "$GITHUB_OUTPUT"
          echo "✅ Created Jira ticket: ${JIRA_KEY}"

          node scripts/jira-transition.js \
            --action transition \
            --key "$JIRA_KEY" \
            --status "In Progress"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install deps
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image to ECR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## 📦 Image Built"                                       >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                                          >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                                           >> $GITHUB_STEP_SUMMARY
          echo "| Tag    | \`${{ steps.meta.outputs.image_tag }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |"      >> $GITHUB_STEP_SUMMARY
          echo "| Jira   | ${{ steps.jira_create.outputs.jira_key }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 3 – Deploy to DEV  →  Jira: comment only (stays In Progress)
  # ============================================================================
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push]
    environment: dev

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-dev-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_DEV }} \
            --query taskDefinition \
            --output json > task-def-dev.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"dev"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-dev.json > task-def-dev-patched.json
          mv task-def-dev-patched.json task-def-dev.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-dev.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-dev.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (dev)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_DEV }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.DEV_URL }}"

      - name: Jira → comment (stays In Progress)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "✅ Deployed to DEV — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.DEV_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to dev" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.DEV_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} — commented (In Progress)" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 4 – Deploy to STAGING (approval)  →  Jira: comment only (stays In Progress)
  # ============================================================================
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push, deploy-dev]
    environment: staging

    permissions:
      id-token: write
      contents: write

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev → staging branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout staging || git checkout -b staging
          git merge origin/dev --no-edit -m "chore: promote dev → staging [skip ci]"
          git push origin staging
          echo "✅ dev merged into staging"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-staging-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_STAGING }} \
            --query taskDefinition \
            --output json > task-def-staging.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"staging"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-staging.json > task-def-staging-patched.json
          mv task-def-staging-patched.json task-def-staging.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-staging.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-staging.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_STAGING }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.STAGING_URL }}"

      - name: Jira → comment (stays In Progress)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "✅ Deployed to STAGING — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.STAGING_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to staging" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} — commented (In Progress)" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 5 – Deploy to PROD (approval)  →  Jira: comment + transition to Done
  # ============================================================================
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push, deploy-staging]
    environment: prod

    permissions:
      id-token: write
      contents: write

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging → main branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main
          git merge origin/staging --no-edit -m "chore: promote staging → main [skip ci]"
          git push origin main
          echo "✅ staging merged into main"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-prod-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_PROD }} \
            --query taskDefinition \
            --output json > task-def-prod.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"production"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-prod.json > task-def-prod-patched.json
          mv task-def-prod-patched.json task-def-prod.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-prod.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-prod.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (prod)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_PROD }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.PROD_URL }}"

      - name: Jira → comment + transition to Done
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "🚀 Deployed to PRODUCTION — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.PROD_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          node scripts/jira-transition.js \
            --action transition \
            --key "${{ env.JIRA_KEY }}" \
            --status "Done"

      - name: Tag image as prod-latest
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageDigest=${{ env.IMAGE_DIGEST }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-tag prod-latest \
            --image-manifest "$MANIFEST" || true

      - name: Summary
        run: |
          echo "## 🚀 Deployed to PRODUCTION"                     >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.PROD_URL }}"                         >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} → Done"                  >> $GITHUB_STEP_SUMMARY
