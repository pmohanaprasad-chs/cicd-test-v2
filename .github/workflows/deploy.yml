# .github/workflows/deploy.yml
# ============================================================================
# DEPLOY PIPELINE
#
# Trigger : push to the `dev` branch
# Flow    : provision (3 accounts) → build → deploy-dev → deploy-staging → deploy-prod
#
# ── GitHub Variables required (repo-level) ───────────────────────────────────
#   AWS_REGION          e.g. us-east-1
#   PROJECT_NAME        e.g. my-app
#   ECR_REPOSITORY      e.g. my-app
#   TF_GITHUB_ORG       e.g. my-org
#   TF_GITHUB_REPO      e.g. my-app
#
# ── GitHub Variables required (per environment) ──────────────────────────────
#   dev env     : IAM_ROLE_ARN, TF_STATE_BUCKET, TF_LOCK_TABLE, DEV_URL
#   staging env : IAM_ROLE_ARN, TF_STATE_BUCKET, TF_LOCK_TABLE, STAGING_URL
#   prod env    : IAM_ROLE_ARN, TF_STATE_BUCKET, TF_LOCK_TABLE, PROD_URL
#
# ── GitHub Secrets required ───────────────────────────────────────────────────
#   dev env     : ECS_CLUSTER, ECS_SERVICE, ECS_TASK_FAMILY
#   staging env : ECS_CLUSTER, ECS_SERVICE, ECS_TASK_FAMILY
#   prod env    : ECS_CLUSTER, ECS_SERVICE, ECS_TASK_FAMILY
#   repo-level  : GH_PAT (fine-grained: Variables + Environments read/write)
#
# ── Optional secrets (Jira integration) ──────────────────────────────────────
#   repo-level  : JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN
#
# ── To use this for a new project ────────────────────────────────────────────
#   1. Fork / copy this repo
#   2. Set all variables and secrets above in GitHub settings
#   3. Bootstrap OIDC + IAM role in each AWS account (see docs/bootstrap.md)
#   4. Push to dev — the pipeline handles everything else
# ============================================================================

name: Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing ECR image tag to promote (skip build)'
        required: false
        type: string

env:
  NODE_VERSION: 20
  TF_VERSION: '1.7.5'

jobs:
  # ============================================================================
  # JOB 1a — Provision dev account
  # ============================================================================
  provision-dev:
    name: Provision dev account
    uses: ./.github/workflows/_provision.yml
    with:
      environment: dev
      tf_state_key: '${{ vars.PROJECT_NAME }}/dev/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      github_org: ${{ vars.TF_GITHUB_ORG }}
      github_repo: ${{ vars.TF_GITHUB_REPO }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.DEV_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.DEV_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.DEV_TF_LOCK_TABLE }}

  # ============================================================================
  # JOB 1b — Provision staging account
  # ============================================================================
  provision-staging:
    name: Provision staging account
    uses: ./.github/workflows/_provision.yml
    with:
      environment: staging
      tf_state_key: '${{ vars.PROJECT_NAME }}/staging/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      github_org: ${{ vars.TF_GITHUB_ORG }}
      github_repo: ${{ vars.TF_GITHUB_REPO }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.STAGING_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.STAGING_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.STAGING_TF_LOCK_TABLE }}

  # ============================================================================
  # JOB 1c — Provision prod account (ECR + VPC + ECS + ALB)
  # ============================================================================
  provision-prod:
    name: Provision prod account
    uses: ./.github/workflows/_provision.yml
    with:
      environment: prod
      tf_state_key: '${{ vars.PROJECT_NAME }}/prod/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      github_org: ${{ vars.TF_GITHUB_ORG }}
      github_repo: ${{ vars.TF_GITHUB_REPO }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.PROD_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.PROD_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.PROD_TF_LOCK_TABLE }}

  # ============================================================================
  # JOB 2 — Build & push image to prod ECR + create Jira ticket
  # ============================================================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [provision-dev, provision-staging, provision-prod]
    environment: prod

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.digest }}
      jira_key: ${{ steps.jira_create.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — prod account)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.PROD_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: build-${{ github.run_id }}

      - name: Login to Amazon ECR (prod)
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create Jira ticket → In Progress
        id: jira_create
        if: vars.JIRA_ENABLED == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          JIRA_KEY=$(node scripts/jira-transition.js \
            --action create \
            --summary "Deploy #${{ github.run_number }} - ${SHORT_SHA} (${{ github.ref_name }})" \
            --project "${{ vars.JIRA_PROJECT_KEY }}" 2>/dev/null)
          echo "jira_key=${JIRA_KEY}" >> "$GITHUB_OUTPUT"
          node scripts/jira-transition.js \
            --action transition \
            --key "$JIRA_KEY" \
            --status "In Progress"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install deps
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          # Only one tag — immutable sha-based. Deployed via digest, never mutable tags.
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## 📦 Image Built"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Key    | Value |"                                              >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|"                                              >> $GITHUB_STEP_SUMMARY
          echo "| Tag    | \`${{ steps.meta.outputs.image_tag }}\` |"          >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |"             >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 3 — Deploy to DEV (auto, no approval)
  # ============================================================================
  deploy-dev:
    name: Deploy → dev
    needs: [provision-dev, build-and-push]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: dev
      app_env: dev
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      image_digest: ${{ needs.build-and-push.outputs.image_digest }}
      build_sha: ${{ github.sha }}
      run_number: ${{ github.run_number }}
      jira_key: ${{ needs.build-and-push.outputs.jira_key }}
      smoke_test_url: ${{ vars.DEV_URL }}
    secrets:
      IAM_ROLE_ARN: ${{ vars.DEV_IAM_ROLE_ARN }}
      ECR_REGISTRY: ${{ vars.PROD_ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.DEV_ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.DEV_ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.DEV_ECS_TASK_FAMILY }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  # ============================================================================
  # JOB 4 — Deploy to STAGING (requires approval)
  # ============================================================================
  deploy-staging:
    name: Deploy → staging
    needs: [provision-staging, build-and-push, deploy-dev]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      app_env: staging
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      image_digest: ${{ needs.build-and-push.outputs.image_digest }}
      build_sha: ${{ github.sha }}
      run_number: ${{ github.run_number }}
      jira_key: ${{ needs.build-and-push.outputs.jira_key }}
      smoke_test_url: ${{ vars.STAGING_URL }}
    secrets:
      IAM_ROLE_ARN: ${{ vars.STAGING_IAM_ROLE_ARN }}
      ECR_REGISTRY: ${{ vars.PROD_ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.STAGING_ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.STAGING_ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.STAGING_ECS_TASK_FAMILY }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  # ============================================================================
  # JOB 5 — Deploy to PROD (requires approval) + Jira → Done
  # ============================================================================
  deploy-prod:
    name: Deploy → prod
    needs: [provision-prod, build-and-push, deploy-staging]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: prod
      app_env: production
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      image_digest: ${{ needs.build-and-push.outputs.image_digest }}
      build_sha: ${{ github.sha }}
      run_number: ${{ github.run_number }}
      jira_key: ${{ needs.build-and-push.outputs.jira_key }}
      smoke_test_url: ${{ vars.PROD_URL }}
    secrets:
      IAM_ROLE_ARN: ${{ vars.PROD_IAM_ROLE_ARN }}
      ECR_REGISTRY: ${{ vars.PROD_ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.PROD_ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.PROD_ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.PROD_ECS_TASK_FAMILY }}
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}

  # ============================================================================
  # JOB 6 — Jira → Done (after prod deploy)
  # ============================================================================
  jira-done:
    name: Jira → Done
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: needs.build-and-push.outputs.jira_key != '' && vars.JIRA_ENABLED == 'true'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Jira → Done
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          node scripts/jira-transition.js \
            --action transition \
            --key "${{ needs.build-and-push.outputs.jira_key }}" \
            --status "Done"
