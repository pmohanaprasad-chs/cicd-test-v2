# ============================================================================
# deploy.yml  –  Infra → Build → ECR → ECS
#
# Jira flow:
#   build-and-push  → create ticket → In Progress
#   deploy-dev      → comment only  (stays In Progress)
#   deploy-staging  → comment only  (stays In Progress)
#   deploy-prod     → comment + transition to Done
# ============================================================================
name: Deploy

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Existing ECR image tag to promote (skip build)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  TF_VERSION: '1.7.5'
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

# ============================================================================
# JOB 1 – Provision infrastructure (idempotent)
# ============================================================================
jobs:
  provision-infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    outputs:
      ecr_url: ${{ steps.outputs.outputs.ecr_url }}
      alb_dns: ${{ steps.outputs.outputs.alb_dns }}
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      service_dev: ${{ steps.outputs.outputs.service_dev }}
      service_staging: ${{ steps.outputs.outputs.service_staging }}
      service_prod: ${{ steps.outputs.outputs.service_prod }}
      task_family_dev: ${{ steps.outputs.outputs.task_family_dev }}
      task_family_staging: ${{ steps.outputs.outputs.task_family_staging }}
      task_family_prod: ${{ steps.outputs.outputs.task_family_prod }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: tf-infra-${{ github.run_id }}

      - name: Bootstrap Terraform state backend
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${{ vars.TF_LOCK_TABLE }}"
          REGION="${{ env.AWS_REGION }}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 state bucket: $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
            echo "✅ Created S3 bucket"
          else
            echo "✅ S3 bucket exists"
          fi

          TABLE_EXISTS=$(aws dynamodb list-tables --output text \
            | tr '\t' '\n' | grep -x "$TABLE" || true)

          if [[ -z "$TABLE_EXISTS" ]]; then
            echo "Creating DynamoDB lock table: $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "✅ Created DynamoDB table: $TABLE"
          else
            echo "✅ DynamoDB table exists: $TABLE"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write tfvars
        working-directory: terraform
        run: |
          cat > terraform.tfvars << EOF
          aws_region   = "${{ env.AWS_REGION }}"
          project_name = "${{ vars.PROJECT_NAME }}"
          github_org   = "${{ vars.TF_GITHUB_ORG }}"
          github_repo  = "${{ vars.TF_GITHUB_REPO }}"
          EOF

      - name: Fix state checksum if corrupted
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          TABLE="${{ vars.TF_LOCK_TABLE }}"
          KEY="cicd-demo/terraform.tfstate"

          TABLE_EXISTS=$(aws dynamodb list-tables --output text \
            | tr '\t' '\n' | grep -x "$TABLE" || true)

          if [[ -z "$TABLE_EXISTS" ]]; then
            echo "⏭️  DynamoDB table not found — skipping"
            exit 0
          fi

          LOCK_KEY="${BUCKET}/${KEY}-md5"
          ITEM=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}" \
            --output json 2>/dev/null || echo "{}")

          if echo "$ITEM" | jq -e '.Item' > /dev/null 2>&1; then
            echo "🔧 Stale checksum found — removing"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}"
            echo "✅ Checksum cleared"
          else
            echo "✅ No stale checksum"
          fi

          LOCK_KEY2="${BUCKET}/${KEY}"
          LOCK=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key "{\"LockID\": {\"S\": \"${LOCK_KEY2}\"}}" \
            --output json 2>/dev/null || echo "{}")

          if echo "$LOCK" | jq -e '.Item' > /dev/null 2>&1; then
            echo "🔧 Stuck lock found — releasing"
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key "{\"LockID\": {\"S\": \"${LOCK_KEY2}\"}}"
            echo "✅ Lock released"
          else
            echo "✅ No stuck lock"
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cicd-demo/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Import existing resources
        working-directory: terraform
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
        run: |
          set -x
          bash ../scripts/tf-import-ci.sh

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -input=false
          EXIT=$?
          set -e
          if   [[ $EXIT -eq 0 ]]; then echo "result=no_changes" >> "$GITHUB_OUTPUT"
          elif [[ $EXIT -eq 2 ]]; then echo "result=changes"    >> "$GITHUB_OUTPUT"
          else exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.result == 'changes'
        working-directory: terraform
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        id: outputs
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cicd-demo/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true" > /dev/null 2>&1

          echo "ecr_url=$(terraform output -raw ecr_repository_url)"              >> "$GITHUB_OUTPUT"
          echo "alb_dns=$(terraform output -raw alb_dns_name)"                    >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw ecs_cluster_name)"           >> "$GITHUB_OUTPUT"
          echo "service_dev=$(terraform output -raw ecs_service_dev)"             >> "$GITHUB_OUTPUT"
          echo "service_staging=$(terraform output -raw ecs_service_staging)"     >> "$GITHUB_OUTPUT"
          echo "service_prod=$(terraform output -raw ecs_service_prod)"           >> "$GITHUB_OUTPUT"
          echo "task_family_dev=$(terraform output -raw task_family_dev)"         >> "$GITHUB_OUTPUT"
          echo "task_family_staging=$(terraform output -raw task_family_staging)" >> "$GITHUB_OUTPUT"
          echo "task_family_prod=$(terraform output -raw task_family_prod)"       >> "$GITHUB_OUTPUT"

      - name: Sync ALB URLs to GitHub variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ALB="http://${{ steps.outputs.outputs.alb_dns }}"
          REPO="${{ github.repository }}"
          gh variable set "DEV_URL"     --body "${ALB}/dev"     --env dev     --repo "$REPO"
          gh variable set "STAGING_URL" --body "${ALB}/staging" --env staging --repo "$REPO"
          gh variable set "PROD_URL"    --body "$ALB"           --env prod    --repo "$REPO"
          echo "✅ URLs synced: $ALB"

      - name: Summary
        working-directory: terraform
        run: |
          STATUS="${{ steps.plan.outputs.result }}"
          ALB="http://${{ steps.outputs.outputs.alb_dns }}"
          [[ "$STATUS" == "no_changes" ]] \
            && echo "## ✅ Infrastructure unchanged" >> $GITHUB_STEP_SUMMARY \
            || echo "## 🏗️ Infrastructure updated"  >> $GITHUB_STEP_SUMMARY
          echo "ALB: $ALB" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 2 – Build & push + create Jira ticket → In Progress
  # ============================================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: provision-infra
    environment: dev

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_digest: ${{ steps.push.outputs.digest }}
      jira_key: ${{ steps.jira_create.outputs.jira_key }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: build-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Create Jira ticket → In Progress ───────────────────────────────────
      - name: Create Jira task → In Progress
        id: jira_create
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUMMARY="Deploy #${{ github.run_number }} - ${SHORT_SHA} (${{ github.ref_name }})"
          DESCRIPTION="Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Message: ${{ github.event.head_commit.message }}
          Run: ${RUN_URL}"

          # stderr (logs) printed to console; stdout is the clean key only
          JIRA_KEY=$(node scripts/jira-transition.js \
            --action create \
            --project CSD \
            --summary "$SUMMARY" \
            --description "$DESCRIPTION" 2>/dev/null)

          echo "jira_key=${JIRA_KEY}" >> "$GITHUB_OUTPUT"
          echo "✅ Created Jira ticket: ${JIRA_KEY}"

          node scripts/jira-transition.js \
            --action transition \
            --key "$JIRA_KEY" \
            --status "In Progress"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install deps
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image to ECR
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-latest
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "## 📦 Image Built"                                       >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                                          >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                                           >> $GITHUB_STEP_SUMMARY
          echo "| Tag    | \`${{ steps.meta.outputs.image_tag }}\` |"   >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |"      >> $GITHUB_STEP_SUMMARY
          echo "| Jira   | ${{ steps.jira_create.outputs.jira_key }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 3 – Deploy to DEV  →  Jira: comment only (stays In Progress)
  # ============================================================================
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push]
    environment: dev

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-dev-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_DEV }} \
            --query taskDefinition \
            --output json > task-def-dev.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"dev"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-dev.json > task-def-dev-patched.json
          mv task-def-dev-patched.json task-def-dev.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-dev.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-dev.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (dev)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_DEV }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.DEV_URL }}"

      - name: Jira → comment (stays In Progress)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "✅ Deployed to DEV — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.DEV_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to dev" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.DEV_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} — commented (In Progress)" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 4 – Deploy to STAGING (approval)  →  Jira: comment only (stays In Progress)
  # ============================================================================
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push, deploy-dev]
    environment: staging

    permissions:
      id-token: write
      contents: write

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev → staging branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout staging || git checkout -b staging
          git merge origin/dev --no-edit -m "chore: promote dev → staging [skip ci]"
          git push origin staging
          echo "✅ dev merged into staging"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-staging-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_STAGING }} \
            --query taskDefinition \
            --output json > task-def-staging.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"staging"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-staging.json > task-def-staging-patched.json
          mv task-def-staging-patched.json task-def-staging.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-staging.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-staging.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_STAGING }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 20

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.STAGING_URL }}"

      - name: Jira → comment (stays In Progress)
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "✅ Deployed to STAGING — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.STAGING_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to staging" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.STAGING_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} — commented (In Progress)" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # JOB 5 – Deploy to PROD (approval)  →  Jira: comment + transition to Done
  # ============================================================================
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [provision-infra, build-and-push, deploy-staging]
    environment: prod

    permissions:
      id-token: write
      contents: write

    env:
      IMAGE_DIGEST: ${{ needs.build-and-push.outputs.image_digest }}
      JIRA_KEY: ${{ needs.build-and-push.outputs.jira_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging → main branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -b main
          git merge origin/staging --no-edit -m "chore: promote staging → main [skip ci]"
          git push origin main
          echo "✅ staging merged into main"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-prod-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download & patch task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_FAMILY_PROD }} \
            --query taskDefinition \
            --output json > task-def-prod.json

          jq '(.containerDefinitions[0].environment) |=
            (map(select(.name != "APP_ENV" and .name != "BUILD_SHA")) +
            [{"name":"APP_ENV","value":"production"},
             {"name":"BUILD_SHA","value":"${{ github.sha }}"}])' \
            task-def-prod.json > task-def-prod-patched.json
          mv task-def-prod-patched.json task-def-prod.json

          echo "✅ Patched env vars:"
          jq '.containerDefinitions[0].environment' task-def-prod.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-prod.json
          container-name: ${{ vars.ECS_CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}@${{ env.IMAGE_DIGEST }}

      - name: Deploy to ECS (prod)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_PROD }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ vars.PROD_URL }}"

      - name: Jira → comment + transition to Done
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          node scripts/jira-transition.js \
            --action comment \
            --key "${{ env.JIRA_KEY }}" \
            --comment "🚀 Deployed to PRODUCTION — Build #${{ github.run_number }} | SHA: ${SHORT_SHA}
          URL: ${{ vars.PROD_URL }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          node scripts/jira-transition.js \
            --action transition \
            --key "${{ env.JIRA_KEY }}" \
            --status "Done"

      - name: Tag image as prod-latest
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageDigest=${{ env.IMAGE_DIGEST }} \
            --query 'images[0].imageManifest' --output text)
          aws ecr put-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-tag prod-latest \
            --image-manifest "$MANIFEST" || true

      - name: Summary
        run: |
          echo "## 🚀 Deployed to PRODUCTION"                     >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ vars.PROD_URL }}"                         >> $GITHUB_STEP_SUMMARY
          echo "Jira: ${{ env.JIRA_KEY }} → Done"                  >> $GITHUB_STEP_SUMMARY
