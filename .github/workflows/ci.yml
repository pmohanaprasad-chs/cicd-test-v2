# .github/workflows/ci.yml
# ============================================================================
# CI — Pull Request quality gate
# Runs on every PR and push to any branch.
# No AWS credentials needed — lint, test, build only.
# ============================================================================
name: CI

on:
  pull_request:
  push:
    branches-ignore: [main, staging]  # skip on merge commits from pipeline

env:
  NODE_VERSION: 20

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./app
        run: pnpm lint

      - name: Test
        working-directory: ./app
        run: pnpm test --passWithNoTests

      - name: Build (type-check + Next.js compile)
        working-directory: ./app
        run: pnpm build

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          build-args: BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
