# ============================================================================
# ci.yml  –  Pull-Request & push quality gate
# Runs on:  all PRs, pushes to dev / staging / main
# Does NOT push images or deploy.
# ============================================================================
name: CI

on:
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: ./app

jobs:
  # --------------------------------------------------------------------------
  # Job 1 – lint + unit tests
  # --------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit tests (with coverage)
        run: pnpm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.run_id }}
          path: ./app/coverage/
          if-no-files-found: warn
          retention-days: 14

  # --------------------------------------------------------------------------
  # Job 2 – Next.js production build
  # --------------------------------------------------------------------------
  build-app:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm run build
        env:
          APP_ENV: ci
          BUILD_SHA: ${{ github.sha }}

  # --------------------------------------------------------------------------
  # Job 3 – Docker build (no push on PR / push to non-main branches)
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker Build (validate only)
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          tags: cicd-demo:${{ github.sha }}
          build-args: |
            APP_ENV=ci
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=cicd-demo,push=false
