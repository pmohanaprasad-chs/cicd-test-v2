# .github/workflows/_provision.yml
# ============================================================================
# REUSABLE WORKFLOW — Provision infrastructure for ONE environment account.
#
# Called by deploy.yml for each of: dev, staging, prod
# Each call targets a different AWS account via its own IAM role + state key.
# ============================================================================
name: _Provision Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment name (dev | staging | prod)'
        required: true
        type: string
      tf_state_key:
        description: "S3 key for this env's terraform state"
        required: true
        type: string
      aws_region:
        description: 'AWS region'
        required: true
        type: string
      project_name:
        description: 'Project name — used to prefix all resources'
        required: true
        type: string
      github_org:
        description: 'GitHub org/user (for OIDC trust)'
        required: true
        type: string
      github_repo:
        description: 'GitHub repo name (for OIDC trust)'
        required: true
        type: string
      tf_version:
        description: 'Terraform version'
        required: false
        type: string
        default: '1.7.5'

    secrets:
      IAM_ROLE_ARN:
        description: 'OIDC role ARN in this account'
        required: true
      TF_STATE_BUCKET:
        description: 'S3 bucket for Terraform state'
        required: true
      TF_LOCK_TABLE:
        description: 'DynamoDB table for state locking'
        required: true

    outputs:
      alb_dns:
        description: 'ALB DNS name'
        value: ${{ jobs.provision.outputs.alb_dns }}
      ecr_url:
        description: 'ECR repository URL (prod only)'
        value: ${{ jobs.provision.outputs.ecr_url }}
      cluster_name:
        description: 'ECS cluster name'
        value: ${{ jobs.provision.outputs.cluster_name }}
      service_name:
        description: 'ECS service name for this env'
        value: ${{ jobs.provision.outputs.service_name }}
      task_family:
        description: 'ECS task family for this env'
        value: ${{ jobs.provision.outputs.task_family }}
      github_actions_role_arn:
        description: 'GitHub Actions IAM role ARN'
        value: ${{ jobs.provision.outputs.github_actions_role_arn }}

jobs:
  provision:
    name: Provision (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    outputs:
      alb_dns: ${{ steps.outputs.outputs.alb_dns }}
      ecr_url: ${{ steps.outputs.outputs.ecr_url }}
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      service_name: ${{ steps.outputs.outputs.service_name }}
      task_family: ${{ steps.outputs.outputs.task_family }}
      github_actions_role_arn: ${{ steps.outputs.outputs.github_actions_role_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: tf-${{ inputs.environment }}-${{ github.run_id }}
          role-duration-seconds: 7200

      - name: Bootstrap Terraform state backend
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          TABLE="${{ secrets.TF_LOCK_TABLE }}"
          REGION="${{ inputs.aws_region }}"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating S3 state bucket: $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              $([ "$REGION" != "us-east-1" ] && echo "--create-bucket-configuration LocationConstraint=$REGION" || echo "")
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'
            echo "✅ Created S3 bucket: $BUCKET"
          else
            echo "✅ S3 bucket exists: $BUCKET"
          fi

          if ! aws dynamodb describe-table --table-name "$TABLE" > /dev/null 2>&1; then
            echo "Creating DynamoDB lock table: $TABLE"
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists --table-name "$TABLE"
            echo "✅ Created DynamoDB table: $TABLE"
          else
            echo "✅ DynamoDB table exists: $TABLE"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: false

      - name: Write tfvars
        working-directory: terraform/accounts/${{ inputs.environment }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region   = "${{ inputs.aws_region }}"
          project_name = "${{ inputs.project_name }}"
          github_org   = "${{ inputs.github_org }}"
          github_repo  = "${{ inputs.github_repo }}"
          environment  = "${{ inputs.environment }}"
          EOF

      - name: Fix state checksum / stuck lock
        run: |
          BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          TABLE="${{ secrets.TF_LOCK_TABLE }}"
          KEY="${{ inputs.tf_state_key }}"

          if ! aws dynamodb describe-table --table-name "$TABLE" > /dev/null 2>&1; then
            echo "⏭️  DynamoDB table not found — skipping"
            exit 0
          fi

          for SUFFIX in "-md5" ""; do
            LOCK_KEY="${BUCKET}/${KEY}${SUFFIX}"
            ITEM=$(aws dynamodb get-item \
              --table-name "$TABLE" \
              --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}" \
              --output json 2>/dev/null || echo "{}")
            if echo "$ITEM" | jq -e '.Item' > /dev/null 2>&1; then
              aws dynamodb delete-item \
                --table-name "$TABLE" \
                --key "{\"LockID\": {\"S\": \"${LOCK_KEY}\"}}"
              echo "✅ Cleared stale entry: ${LOCK_KEY}"
            fi
          done

      - name: Terraform Init
        working-directory: terraform/accounts/${{ inputs.environment }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Import existing resources
        working-directory: terraform/accounts/${{ inputs.environment }}
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          PROJECT_NAME: ${{ inputs.project_name }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: bash ../../../scripts/tf-import-ci.sh

      - name: Terraform Plan
        id: plan
        working-directory: terraform/accounts/${{ inputs.environment }}
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -input=false
          EXIT=$?
          set -e
          if   [[ $EXIT -eq 0 ]]; then echo "result=no_changes" >> "$GITHUB_OUTPUT"
          elif [[ $EXIT -eq 2 ]]; then echo "result=changes"    >> "$GITHUB_OUTPUT"
          else exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.result == 'changes'
        working-directory: terraform/accounts/${{ inputs.environment }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture outputs
        id: outputs
        working-directory: terraform/accounts/${{ inputs.environment }}
        run: |
          # Re-init to ensure outputs are readable
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true" > /dev/null 2>&1

          # ECR (prod account only)
          ECR_URL=$(terraform output -raw ecr_repository_url 2>/dev/null || echo "")
          echo "ecr_url=${ECR_URL}" >> "$GITHUB_OUTPUT"

          # ALB
          ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"

          # ECS
          CLUSTER=$(terraform output -raw ecs_cluster_name 2>/dev/null || echo "")
          echo "cluster_name=${CLUSTER}" >> "$GITHUB_OUTPUT"

          ENV="${{ inputs.environment }}"
          SVC=$(terraform output -raw "ecs_service_${ENV}" 2>/dev/null || echo "")
          TF=$(terraform output -raw "task_family_${ENV}" 2>/dev/null || echo "")
          echo "service_name=${SVC}" >> "$GITHUB_OUTPUT"
          echo "task_family=${TF}"   >> "$GITHUB_OUTPUT"

          ROLE=$(terraform output -raw github_actions_role_arn 2>/dev/null || echo "")
          echo "github_actions_role_arn=${ROLE}" >> "$GITHUB_OUTPUT"
