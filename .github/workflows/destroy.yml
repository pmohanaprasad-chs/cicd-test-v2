# .github/workflows/destroy.yml
# ============================================================================
# DESTROY PIPELINE
#
# Tears down infrastructure in one or all accounts.
# Triggered manually only — requires typing "destroy" to confirm.
#
# OIDC provider + github-actions IAM role are NEVER deleted.
# ============================================================================
name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm"
        required: true
        type: string
      target_env:
        description: 'Which account to destroy'
        required: true
        type: choice
        options: [all, dev, staging, prod]
      delete_state_backend:
        description: 'Also delete S3 + DynamoDB state backend?'
        required: false
        type: boolean
        default: false

env:
  TF_VERSION: '1.7.5'

jobs:
  # ── Safety gate ─────────────────────────────────────────────────────────────
  confirm:
    name: Confirm destroy
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'destroy'
        run: |
          echo "❌ You typed: '${{ inputs.confirm }}' — must be exactly: destroy"
          exit 1

  # ── Per-account destroy jobs ─────────────────────────────────────────────────
  destroy-dev:
    name: Destroy dev
    needs: confirm
    if: inputs.target_env == 'all' || inputs.target_env == 'dev'
    uses: ./.github/workflows/_destroy-account.yml
    with:
      environment: dev
      tf_state_key: '${{ vars.PROJECT_NAME }}/dev/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      delete_state_backend: ${{ inputs.delete_state_backend }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.DEV_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.DEV_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.DEV_TF_LOCK_TABLE }}

  destroy-staging:
    name: Destroy staging
    needs: confirm
    if: inputs.target_env == 'all' || inputs.target_env == 'staging'
    uses: ./.github/workflows/_destroy-account.yml
    with:
      environment: staging
      tf_state_key: '${{ vars.PROJECT_NAME }}/staging/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      delete_state_backend: ${{ inputs.delete_state_backend }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.STAGING_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.STAGING_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.STAGING_TF_LOCK_TABLE }}

  destroy-prod:
    name: Destroy prod
    needs: [confirm, destroy-staging]
    if: inputs.target_env == 'all' || inputs.target_env == 'prod'
    uses: ./.github/workflows/_destroy-account.yml
    with:
      environment: prod
      tf_state_key: '${{ vars.PROJECT_NAME }}/prod/terraform.tfstate'
      aws_region: ${{ vars.AWS_REGION }}
      project_name: ${{ vars.PROJECT_NAME }}
      delete_state_backend: ${{ inputs.delete_state_backend }}
      tf_version: '1.7.5'
    secrets:
      IAM_ROLE_ARN: ${{ vars.PROD_IAM_ROLE_ARN }}
      TF_STATE_BUCKET: ${{ vars.PROD_TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.PROD_TF_LOCK_TABLE }}
